name: cd

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/build.yml

    permissions:
      contents: read
      security-events: write
      pull-requests: write
      pages: write
      id-token: write

    secrets: inherit

    with:
      scan: true
      coverage: true
      doc: true
