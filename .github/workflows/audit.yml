name: audit

on:
  schedule:
    - cron: "0 11 * * 0"

  workflow_dispatch:

jobs:
  security:
    uses: ./.github/workflows/build.yml

    permissions:
      contents: read
      security-events: write
      pull-requests: write
      pages: write
      id-token: write

    secrets: inherit

    with:
      scan: true
